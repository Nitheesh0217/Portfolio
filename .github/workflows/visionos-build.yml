name: visionOS Build

on:
  push:
    branches: [main]
    paths:
      - "NitheeshPortfolio/**"
      - "project.yml"
      - ".github/workflows/visionos-build.yml"
  pull_request:
    paths:
      - "NitheeshPortfolio/**"
      - "project.yml"
  workflow_dispatch:        # manual run from the Actions tab

jobs:
  build:
    name: Build visionOS Simulator app
    runs-on: macos-15       # Xcode 16 + visionOS 2 SDK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcodes
        run: ls /Applications | grep Xcode

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Print Xcode + SDK info
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i vision || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show generated project tree
        run: |
          ls -la
          ls -la NitheeshPortfolio.xcodeproj

      - name: Pick a visionOS simulator destination
        id: dest
        run: |
          DEST=$(xcrun simctl list -j devicetypes \
                 | python3 -c "import sys,json; d=json.load(sys.stdin)['devicetypes']; \
                               print(next(t['identifier'] for t in d if 'Vision' in t['name']))")
          echo "Using device type: $DEST"
          echo "device_type=$DEST" >> "$GITHUB_OUTPUT"

      - name: Build for visionOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project NitheeshPortfolio.xcodeproj \
            -scheme NitheeshPortfolio \
            -configuration Debug \
            -destination 'generic/platform=visionOS Simulator' \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            | tee xcodebuild.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log

      - name: Upload .app bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: NitheeshPortfolio-app
          path: build/Build/Products/Debug-xrsimulator/NitheeshPortfolio.app

  screenshot:
    name: Boot simulator & capture screenshot
    runs-on: macos-15
    needs: build
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Download built .app
        uses: actions/download-artifact@v4
        with:
          name: NitheeshPortfolio-app
          path: AppArtifact

      - name: Create + boot a visionOS simulator
        id: sim
        run: |
          DEVICE_TYPE=$(xcrun simctl list -j devicetypes \
                       | python3 -c "import sys,json; d=json.load(sys.stdin)['devicetypes']; \
                                     print(next(t['identifier'] for t in d if 'Vision' in t['name']))")
          RUNTIME=$(xcrun simctl list -j runtimes \
                   | python3 -c "import sys,json; r=json.load(sys.stdin)['runtimes']; \
                                 print(next(x['identifier'] for x in r if ('vision' in x['identifier'].lower() or 'xros' in x['identifier'].lower()) and x['isAvailable']))")
          UDID=$(xcrun simctl create "Vision-CI" "$DEVICE_TYPE" "$RUNTIME")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Install + launch app
        run: |
          xcrun simctl install ${{ steps.sim.outputs.udid }} AppArtifact/NitheeshPortfolio.app
          xcrun simctl launch ${{ steps.sim.outputs.udid }} dev.nitheesh.NitheeshPortfolio
          sleep 15

      - name: Capture screenshot
        run: |
          xcrun simctl io ${{ steps.sim.outputs.udid }} screenshot welcome.png || true
          ls -la welcome.png

      - name: Upload screenshot
        uses: actions/upload-artifact@v4
        with:
          name: visionOS-screenshot
          path: welcome.png

      - name: Shutdown sim
        if: always()
        run: xcrun simctl shutdown ${{ steps.sim.outputs.udid }} || true
